name: BenchmarkApp
options:
  bundleIdPrefix: com.iosllmbenchmark
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: ""
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    CODE_SIGN_STYLE: Automatic
    SWIFT_STRICT_CONCURRENCY: minimal

packages:
  mlx-swift-lm:
    url: https://github.com/ml-explore/mlx-swift-lm
    branch: main
  swift-huggingface:
    url: https://github.com/huggingface/swift-huggingface
    from: "0.8.1"
  swift-transformers:
    url: https://github.com/huggingface/swift-transformers
    from: "1.0.0"
  executorch:
    url: https://github.com/pytorch/executorch.git
    branch: swiftpm-1.3.0.20260501
  Anemll:
    path: Vendored/Anemll/anemll-swift-cli
  CoreML-LLM:
    url: https://github.com/john-rocky/CoreML-LLM
    from: "1.4.0"

targets:
  BenchmarkApp:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: Sources
      - path: Vendored
        optional: true
        type: folder
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: iOS LLM Bench
        CFBundleShortVersionString: "0.2.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UIRequiresFullScreen: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIBackgroundModes:
          - processing
        UIFileSharingEnabled: true
        LSSupportsOpeningDocumentsInPlace: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.iosllmbenchmark.benchmarkapp
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_STRICT_CONCURRENCY: minimal
        OTHER_LDFLAGS: "-ObjC"
        ENABLE_USER_SCRIPT_SANDBOXING: NO
    dependencies:
      - package: mlx-swift-lm
        product: MLXLLM
      - package: mlx-swift-lm
        product: MLXLMCommon
      - package: swift-huggingface
        product: HuggingFace
      - package: swift-transformers
        product: Transformers
      - package: CoreML-LLM
        product: CoreMLLLM
      - package: executorch
        product: executorch
      - package: executorch
        product: executorch_llm
      - package: executorch
        product: backend_xnnpack
      - package: executorch
        product: kernels_llm
      - package: executorch
        product: kernels_optimized
      - package: executorch
        product: kernels_quantized
      - package: Anemll
        product: AnemllCore
      - framework: Vendored/llama.xcframework
        embed: true
        codeSign: true
        optional: true
