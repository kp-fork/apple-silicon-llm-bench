name: BenchmarkApp
options:
  bundleIdPrefix: com.iosllmbenchmark
  deploymentTarget:
    iOS: "18.0"
    macOS: "14.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: ""
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    CODE_SIGN_STYLE: Automatic
    SWIFT_STRICT_CONCURRENCY: minimal

packages:
  mlx-swift-lm:
    url: https://github.com/ml-explore/mlx-swift-lm
    branch: main
  swift-huggingface:
    url: https://github.com/huggingface/swift-huggingface
    from: "0.8.1"
  swift-transformers:
    url: https://github.com/huggingface/swift-transformers
    from: "1.0.0"
  executorch:
    url: https://github.com/pytorch/executorch.git
    branch: swiftpm-1.3.0.20260501
  Anemll:
    path: Vendored/Anemll/anemll-swift-cli
  CoreML-LLM:
    # Local path (not url) so the in-tree `.qwen3_06b` stateful preset (added to
    # Qwen3VL2BStatefulGenerator) + any local conversion fixes are picked up.
    # Vendored/ is git-ignored; symlink it: Vendored/CoreML-LLM -> ~/Downloads/CoreML-LLM
    path: Vendored/CoreML-LLM
  LiteRT-LM:
    # Local path (not url:) so SwiftPM accepts the package's `.unsafeFlags(-all_load)`
    # — versioned/remote products with unsafe flags are rejected by SwiftPM.
    # Vendored/ is git-ignored; clone with GIT_LFS_SKIP_SMUDGE=1 (broken Android LFS blob upstream).
    path: Vendored/LiteRT-LM
  coreai-models:
    # Apple's official Core AI Swift runtime (CoreAILM). Local path because the
    # package floor is iOS/macOS 27 and our checkout carries small local fixes.
    # Vendored/ is git-ignored; symlink it: Vendored/coreai-models -> ~/code/coreai/coreai-models
    path: Vendored/coreai-models

targets:
  BenchmarkApp:
    type: application
    platform: iOS
    # Bumped 18.0 -> 27.0: the coreai-models Swift package (CoreAILM) requires
    # iOS 27. The whole current benchmark campaign runs on iPhone 17 Pro (iOS 27).
    # If older-device installs (15/16 Pro) are needed again, split CoreAI into a
    # separate iOS-27 target instead of bumping this one.
    deploymentTarget: "27.0"
    sources:
      - path: Sources
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: iOS LLM Bench
        CFBundleShortVersionString: "0.2.0"
        CFBundleVersion: "1"
        NSCameraUsageDescription: "Used to benchmark live vision-language model inference (VLM) on the camera feed."
        UILaunchScreen: {}
        UIRequiresFullScreen: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIBackgroundModes:
          - processing
        UIFileSharingEnabled: true
        LSSupportsOpeningDocumentsInPlace: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.iosllmbenchmark.benchmarkapp
        CODE_SIGN_ENTITLEMENTS: BenchmarkApp.entitlements
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_STRICT_CONCURRENCY: minimal
        OTHER_LDFLAGS: "-ObjC"
        ENABLE_USER_SCRIPT_SANDBOXING: NO
    dependencies:
      - package: mlx-swift-lm
        product: MLXLLM
      - package: mlx-swift-lm
        product: MLXVLM            # vision-language models (Qwen3-VL) for the camera bench
      - package: mlx-swift-lm
        product: MLXLMCommon
      - package: swift-huggingface
        product: HuggingFace
      - package: swift-transformers
        product: Transformers
      - package: CoreML-LLM
        product: CoreMLLLM
      - package: coreai-models
        product: CoreAILM            # Apple Core AI runtime (iOS 27) for the CoreAIRuntime
      # NOTE: executorch products are dropped from the iOS app while Core AI is
      # linked — coreai-models' CXGrammar.xcframework and executorch.xcframework
      # both emit `include/module.modulemap` to the shared products dir, which
      # Xcode rejects ("Multiple commands produce module.modulemap"). ExecuTorch
      # isn't part of the Core AI/CoreML/MLX comparison. ExecuTorchRuntime falls
      # back to its canImport(ExecuTorchLLM)=false stub. Restore these (or split
      # Core AI into its own target) to re-enable the ExecuTorch runtime.
      - package: Anemll
        product: AnemllCore
      - package: LiteRT-LM
        product: LiteRTLM
      - framework: Vendored/llama.xcframework
        embed: true
        codeSign: true
        optional: true

  yardstick:
    type: tool
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      # Shared with the iOS app, minus the SwiftUI-only Views layer.
      # Each adapter is added back to the Mac target only after its
      # vendor SDK has been verified to build for macOS.
      - path: Sources/Benchmark
      - path: Sources/Models
      - path: Sources/Runtimes/MLXRuntime.swift
      - path: Sources/Runtimes/MLXBridges.swift
      - path: Sources/Runtimes/HFDownloader.swift
      - path: Sources/Runtimes/LLMRuntime.swift
      - path: Sources/Runtimes/CoreMLRuntime.swift
      - path: Sources/Runtimes/ExecuTorchRuntime.swift
      - path: Sources/Runtimes/LlamaCppRuntime.swift
      - path: Sources/Runtimes/AnemllRuntime.swift
      - path: Sources/Runtimes/AppleFMRuntime.swift
      - path: Sources/Runtimes/MediaPipeRuntime.swift
      - path: ../../apple/YardstickCLI/Sources
    settings:
      base:
        PRODUCT_NAME: yardstick
        SWIFT_STRICT_CONCURRENCY: minimal
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        OTHER_LDFLAGS: "-ObjC"
        SKIP_INSTALL: NO
        # Tool targets can't embed frameworks the way .app bundles do; point
        # the runtime linker at the xcframework's macOS slice so the
        # `llama.framework` dylib resolves without `DYLD_FRAMEWORK_PATH`.
        LD_RUNPATH_SEARCH_PATHS: "$(SRCROOT)/Vendored/llama.xcframework/macos-arm64_x86_64"
    dependencies:
      - package: mlx-swift-lm
        product: MLXLLM
      - package: mlx-swift-lm
        product: MLXLMCommon
      - package: swift-huggingface
        product: HuggingFace
      - package: swift-transformers
        product: Transformers
      - package: CoreML-LLM
        product: CoreMLLLM
      - package: executorch
        product: executorch
      - package: executorch
        product: executorch_llm
      - package: executorch
        product: backend_xnnpack
      - package: executorch
        product: kernels_llm
      - package: executorch
        product: kernels_optimized
      - package: executorch
        product: kernels_quantized
      - package: Anemll
        product: AnemllCore
      - package: LiteRT-LM
        product: LiteRTLM
      - framework: Vendored/llama.xcframework
        embed: false
        codeSign: false
        optional: true

# Shared scheme so `xcodebuild -scheme BenchmarkApp` works headlessly (the device
# bench scripts and Core AI capture drive it via -scheme). Without this block
# xcodegen emits no scheme and every `-scheme BenchmarkApp` invocation fails.
schemes:
  BenchmarkApp:
    build:
      targets:
        BenchmarkApp: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
